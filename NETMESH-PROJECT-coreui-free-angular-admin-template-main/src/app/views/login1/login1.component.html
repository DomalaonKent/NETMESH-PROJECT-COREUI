<div class="login-wrapper">
  <c-container>
    <c-row class="justify-content-center align-items-center min-vh-100">
      <c-col sm="8" md="6" lg="5" xl="4">
        <c-card class="login-card">
          <c-card-body class="p-5">

            <div class="text-center mb-4">
              <img src="assets/images/ntc.png" alt="NTC Logo" class="ntc-logo mb-3" />
              <h4 class="ntc-title">NTC Portal</h4>
            </div>

            <c-alert color="danger" *ngIf="errorMessage">
              {{ errorMessage }}
            </c-alert>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

              <div class="mb-3">
                <label cFormLabel for="idNumber" class="field-label">NTC ID No.</label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cilUser"></svg>
                  </span>
                  <input
                    cFormControl
                    id="idNumber"
                    type="text"
                    placeholder="Enter ID Number"
                    formControlName="idNumber"
                    [class.is-invalid]="isFieldInvalid('idNumber')"
                    class="form-input"
                  />
                  <c-form-feedback [valid]="false" *ngIf="isFieldInvalid('idNumber')">
                    ID Number is <strong>required</strong>
                  </c-form-feedback>
                </c-input-group>
              </div>

              <div class="mb-4">
                <label cFormLabel for="password" class="field-label">Password</label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cilLockLocked"></svg>
                  </span>
                  <input
                    cFormControl
                    id="password"
                    type="password"
                    placeholder="Enter Password"
                    formControlName="password"
                    [class.is-invalid]="isFieldInvalid('password')"
                    class="form-input"
                  />
                  <c-form-feedback [valid]="false" *ngIf="isFieldInvalid('password')">
                    Password is <strong>required</strong>
                  </c-form-feedback>
                </c-input-group>
              </div>

              <div class="d-flex gap-3 mt-2">
                <button cButton color="primary" type="submit" class="btn-login flex-fill">
                  Login
                </button>
                <button cButton color="secondary" variant="outline" type="button" class="btn-register flex-fill" routerLink="/register">
                  Register
                </button>
              </div>

            </form>

          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
