<div class="map-wrapper">
  <div class="kml-panel">
    <div class="kml-panel-title">Map Layers</div>
    <div class="kml-layer-item" *ngFor="let layer of kmlLayers">
      <label class="kml-toggle">
        <input type="checkbox" [(ngModel)]="layer.enabled" (change)="toggleLayer(layer)" />
        <span class="kml-dot" [style.background]="layer.color"></span>
        <div class="kml-label-group">
          <span class="kml-name">{{ layer.name }}</span>
          <span class="kml-filename">{{ getFilename(layer.url) }}</span>
        </div>
      </label>
    </div>
    <div class="kml-hint" *ngIf="isLoading">Loading...</div>

    <ng-container *ngIf="markerCount > 0">
      <div class="kml-divider"></div>

      <div class="kml-panel-title">Plotted Markers</div>

      <!-- Marker count row -->
      <div class="kml-marker-row">
        <span class="kml-marker-dot"></span>
        <span class="kml-marker-label">
          {{ markerCount }} coordinate{{ markerCount === 1 ? '' : 's' }} plotted
        </span>
      </div>

      <!-- Detected columns -->
      <div class="kml-col-info" *ngIf="detectedLatCol || detectedLngCol">
        <div class="kml-col-row">
          <span class="kml-col-badge kml-col-lat">LAT</span>
          <span class="kml-col-name">{{ detectedLatCol || '—' }}</span>
        </div>
        <div class="kml-col-row">
          <span class="kml-col-badge kml-col-lng">LNG</span>
          <span class="kml-col-name">{{ detectedLngCol || '—' }}</span>
        </div>
      </div>

      <!-- Skipped rows warning -->
      <div class="kml-skipped-row" *ngIf="skippedCount > 0">
        <span class="kml-skipped-icon">⚠</span>
        <span class="kml-skipped-label">{{ skippedCount }} row{{ skippedCount === 1 ? '' : 's' }} skipped (invalid coords)</span>
      </div>

      <button class="kml-clear-markers" (click)="onClearMarkers()">&#x2715; Clear markers</button>
    </ng-container>

  </div>
  <div #mapContainer class="map-container"></div>
</div>
