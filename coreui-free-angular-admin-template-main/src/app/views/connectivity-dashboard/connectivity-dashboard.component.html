<div class="connectivity-dashboard">
 <div class="page-header">
    <div class="page-title">
      <h2>Connectivity Data</h2>
      <span class="subtitle">Manage and view all connectivity records</span>
    </div>
    <div class="header-buttons">
      <button class="btn-back" (click)="goBack()">← Back</button>
      <button class="btn-add" (click)="onAddNew()">+ Add New</button>
    </div>
  </div>
  
  <div class="toolbar">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        placeholder="Search users"
        [(ngModel)]="searchTerm"
        (input)="onSearch()">
    </div>
    <button class="btn-filters" (click)="onFilter()">
      <span>☰</span> Filters
    </button>
    
  </div>

  <div class="selection-bar" *ngIf="selectedItems.length > 0">
    <span>{{ selectedItems.length }} selected</span>
    <button class="btn-edit"> Edit </button>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>
            <input type="checkbox" [(ngModel)]="selectAll" (change)="onSelectAll()">
          </th>
          <th>ID</th>
          <th>Province</th>
          <th>City / Municipality</th>
          <th>Barangay</th>
          <th>Location </th>
          <th>Validation Date ></th>
          <th>Validation Time </th>
          <th>Technology </th>
          <th>Service Provider </th>
          <th>Upload </th>
          <th>Download </th>
          <th>Signal Strength </th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>

</div>
